services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GATEWAY_CONFIG_FILE: /config/gateway.yaml
      LIGHTHOUSE_ADMIN_USERNAME: ${LIGHTHOUSE_ADMIN_USERNAME:-gateway}
      LIGHTHOUSE_ADMIN_PASSWORD: ${LIGHTHOUSE_ADMIN_PASSWORD:-gateway}
    volumes:
      - ./backend/config:/config:ro
    ports:
      - "${BACKEND_PORT:-8765}:8765"
    depends_on:
      - lighthouse
  ui:
    build:
      context: .
    ports:
      - "${UI_PORT:-8080}:80"
    depends_on:
      - backend
  lighthouse:
    image: oidfed/lighthouse:0.20.0
    restart: unless-stopped
    ports:
      - "${LIGHTHOUSE_PUBLIC_PORT:-8081}:8080"
    volumes:
      - ./lighthouse/config.yaml:/config/config.yaml:ro
      - ./lighthouse/data:/data
    environment:
      LH_CONFIG_FILE: "/config/config.yaml"

  # To add a second LightHouse instance:
  # 1. Uncomment this block and create lighthouse2/config.yaml + lighthouse2/data/
  # 2. Uncomment the matching ta-2 / tenant-2 rows in backend/app/db/seed.py
  # 3. Run: docker compose down -v && docker compose up -d
  #
  # lighthouse2:
  #   image: oidfed/lighthouse:0.20.0
  #   restart: unless-stopped
  #   ports:
  #     - "8082:8080"
  #   volumes:
  #     - ./lighthouse2/config.yaml:/config/config.yaml:ro
  #     - ./lighthouse2/data:/data
  #   environment:
  #     LH_CONFIG_FILE: "/config/config.yaml"
