services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8765:8765"
    depends_on:
      - lighthouse
  ui:
    build:
      context: .
    ports:
      - "8080:80"
    depends_on:
      - backend
  lighthouse:
    image: oidfed/lighthouse:0.20.0
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./lighthouse/config.yaml:/config/config.yaml:ro
      - ./lighthouse/data:/data
    environment:
      LH_CONFIG_FILE: "/config/config.yaml"
