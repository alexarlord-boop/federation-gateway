# LightHouse configuration (v0.20.0 schema).
# All values here are overrideable via LH_* environment variables.

entity_id: "http://localhost:8081"

server:
  port: 8080

storage:
  driver: sqlite
  data_dir: /data

signing:
  kms: filesystem
  auto_generate_keys: true
  filesystem:
    key_dir: /data/keys

api:
  admin:
    enabled: true
    users_enabled: false
    actor_source: "header"
    actor_header: "X-Gateway-User-Email"

# Enable the core OIDFederation endpoints.
# Without these, LightHouse cannot serve as a Trust Anchor or Intermediate Authority.
# - fetch:   Subordinate Fetching Endpoint (required for TA/IA)
# - list:    Subordinate Listing Endpoint  (required for TA/IA)
# - resolve: Federation Resolve Endpoint   (enables trust chain resolution)
endpoints:
  fetch:
    path: /fetch
  list:
    path: /list
  resolve:
    path: /resolve
