name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-bff:
    name: BFF-only E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start full stack
        run: docker compose up -d --wait || (sleep 15 && docker compose up -d)
      - name: Install e2e deps
        run: cd e2e && npm ci && npx playwright install --with-deps chromium
      - name: Run BFF tests
        run: cd e2e && npx playwright test --project=bff-only
        env:
          APP_URL: http://localhost:8080
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-bff
          path: e2e/playwright-report/
          retention-days: 7

  e2e-full:
    name: Full-stack E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start full stack
        run: docker compose up -d --wait || (sleep 15 && docker compose up -d)
      - name: Install e2e deps
        run: cd e2e && npm ci && npx playwright install --with-deps chromium
      - name: Run proxy tests
        run: cd e2e && npx playwright test --project=full-stack
        env:
          APP_URL: http://localhost:8080
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-full
          path: e2e/playwright-report/
          retention-days: 7
